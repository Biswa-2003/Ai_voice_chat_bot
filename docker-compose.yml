version: "3.9"

services:
  voicebot:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: voicebot
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./logs:/app/logs
    environment:
      - PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SCENARIO=${SCENARIO:-presale}
