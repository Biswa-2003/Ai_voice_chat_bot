<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Voicebot — Priya</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a14;
      color: #e2e2f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Header ── */
    .header { text-align: center; }
    .header h1 { font-size: 1.5rem; color: #a78bfa; font-weight: 700; }
    .header p  { font-size: 0.82rem; color: #666; margin-top: 3px; }

    /* ── Scenario pills ── */
    .scenarios { display: flex; gap: 8px; justify-content: center; }
    .scenario-btn {
      padding: 5px 18px;
      border-radius: 20px;
      border: 1px solid #333;
      background: transparent;
      color: #888;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.18s;
    }
    .scenario-btn.active, .scenario-btn:hover {
      background: #a78bfa;
      border-color: #a78bfa;
      color: #fff;
    }

    /* ── Voice gender toggle ── */
    .voice-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .voice-label { font-size: 0.72rem; color: #555; letter-spacing: 0.04em; }
    .voice-toggle {
      display: flex;
      background: #0f0f1e;
      border: 1px solid #1e1e3a;
      border-radius: 20px;
      padding: 3px;
      gap: 2px;
    }
    .voice-btn {
      padding: 4px 14px;
      border-radius: 16px;
      border: none;
      background: transparent;
      color: #555;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.18s;
    }
    .voice-btn.active {
      background: #312e81;
      color: #c4b5fd;
    }
    .voice-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── Orb ── */
    .orb-wrap { display: flex; justify-content: center; }
    .orb {
      width: 110px; height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #7c3aed, #312e81);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
      cursor: pointer;
      transition: box-shadow 0.3s, transform 0.3s;
      user-select: none;
    }
    .orb.idle     { box-shadow: 0 0 0 0 transparent; }
    .orb.listening {
      box-shadow: 0 0 0 12px rgba(124,58,237,0.25), 0 0 0 24px rgba(124,58,237,0.1);
      animation: breathe 2s ease-in-out infinite;
    }
    .orb.speaking {
      box-shadow: 0 0 0 16px rgba(52,211,153,0.25), 0 0 40px rgba(52,211,153,0.35);
      animation: pulse 0.8s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }

    /* ── Frequency visualizer ── */
    .viz-wrap {
      position: relative;
      height: 64px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }
    #viz {
      width: 100%;
      height: 64px;
      display: block;
      border-radius: 10px;
    }
    .viz-label {
      position: absolute;
      bottom: 6px;
      right: 10px;
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ── Status line ── */
    #status {
      text-align: center;
      font-size: 0.88rem;
      color: #666;
      min-height: 20px;
    }
    #status.on  { color: #34d399; }
    #status.err { color: #f87171; }

    /* ── Controls ── */
    .controls { display: flex; gap: 10px; }
    .btn {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.1s;
    }
    .btn:active   { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: default; }
    #connectBtn    { background: linear-gradient(135deg,#7c3aed,#4f46e5); color:#fff; }
    #disconnectBtn { background: transparent; border: 1px solid #f87171; color: #f87171; display:none; }
    #muteBtn       { background: transparent; border: 1px solid #555; color: #aaa; display:none; }

    /* ── Transcript ── */
    .transcript {
      background: #0f0f1e;
      border: 1px solid #1e1e3a;
      border-radius: 12px;
      padding: 12px;
      max-height: 220px;
      overflow-y: auto;
      display: none;
      scroll-behavior: smooth;
    }
    .bubble { display: flex; flex-direction: column; margin-bottom: 10px; }
    .bubble.user { align-items: flex-end; }
    .bubble.bot  { align-items: flex-start; }
    .bubble-inner {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.83rem;
      line-height: 1.5;
    }
    .bubble.user .bubble-inner { background: #312e81; color: #c4b5fd; border-bottom-right-radius: 3px; }
    .bubble.bot  .bubble-inner { background: #1a1a2e; color: #e2e2f0; border-bottom-left-radius: 3px; }
    .bubble-meta { font-size: 0.68rem; color: #555; margin-top: 3px; padding: 0 4px; }

    /* ── Lang badge ── */
    .lang-badge {
      display: inline-block;
      font-size: 0.62rem;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .lang-en { background: #1e3a5f; color: #60a5fa; }
    .lang-hi { background: #3a1e1e; color: #f97316; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 id="botTitle">Priya — AI Voicebot</h1>
    <p>Presale · Sales · Marketing &nbsp;|&nbsp; English &amp; Hindi</p>
  </div>

  <div class="scenarios">
    <button class="scenario-btn active" data-s="presale"   onclick="selectScenario(this)">Presale</button>
    <button class="scenario-btn"        data-s="sales"     onclick="selectScenario(this)">Sales</button>
    <button class="scenario-btn"        data-s="marketing" onclick="selectScenario(this)">Marketing</button>
  </div>

  <!-- Voice gender selector -->
  <div class="voice-row">
    <span class="voice-label">VOICE</span>
    <div class="voice-toggle">
      <button class="voice-btn active" id="voiceFemale" onclick="selectVoice('female', this)">♀ Female</button>
      <button class="voice-btn"        id="voiceMale"   onclick="selectVoice('male',   this)">♂ Male</button>
    </div>
  </div>

  <div class="orb-wrap"><div class="orb idle" id="orb">🎙️</div></div>

  <!-- Frequency visualizer canvas -->
  <div class="viz-wrap">
    <canvas id="viz"></canvas>
    <span class="viz-label" id="vizLabel">frequency</span>
  </div>

  <div id="status">Select a scenario and click Connect</div>

  <div class="controls">
    <button class="btn" id="connectBtn"    onclick="connect()">Connect</button>
    <button class="btn" id="muteBtn"       onclick="toggleMute()">Mute</button>
    <button class="btn" id="disconnectBtn" onclick="disconnect()">End Call</button>
  </div>

  <div class="transcript" id="transcript"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const SERVER = window.location.origin.replace(/^http/, 'ws');
let ws           = null;
let mediaRec     = null;
let micStream    = null;
let muted        = false;
let botSpeaking  = false;
let isPlayingAudio = false;
let audioQueue   = [];
let audioCtx     = null;
let scenario     = 'presale';
let voiceGender  = 'female';
let botName      = 'Priya';

// ── Visualizer state ──────────────────────────────────────────────────────────
let micAnalyser  = null;   // AnalyserNode for mic input
let botAnalyser  = null;   // AnalyserNode for bot audio output
let vizMode      = 'idle'; // 'idle' | 'listening' | 'speaking'
let vizRafId     = null;
let smoothBars   = null;   // smoothed bar heights for animation

const canvas = document.getElementById('viz');
const ctx2d  = canvas.getContext('2d');
const BAR_COUNT = 52;

function initCanvas() {
  const dpr  = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  ctx2d.scale(dpr, dpr);
  smoothBars = new Float32Array(BAR_COUNT).fill(2);
}

window.addEventListener('resize', () => { if (vizRafId) { initCanvas(); } });

function startViz() {
  initCanvas();
  if (vizRafId) cancelAnimationFrame(vizRafId);
  drawFrame();
}

function stopViz() {
  if (vizRafId) cancelAnimationFrame(vizRafId);
  vizRafId = null;
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
}

function drawFrame() {
  vizRafId = requestAnimationFrame(drawFrame);

  const W = canvas.getBoundingClientRect().width;
  const H = canvas.getBoundingClientRect().height;
  ctx2d.clearRect(0, 0, W * (window.devicePixelRatio||1), H * (window.devicePixelRatio||1));

  // ── Read frequency data ──
  const raw = new Float32Array(BAR_COUNT);

  if (vizMode === 'listening' && micAnalyser && !muted) {
    const buf = new Uint8Array(micAnalyser.frequencyBinCount);
    micAnalyser.getByteFrequencyData(buf);
    const step = Math.floor(buf.length / BAR_COUNT);
    for (let i = 0; i < BAR_COUNT; i++) raw[i] = buf[i * step];
  } else if (vizMode === 'speaking' && botAnalyser) {
    const buf = new Uint8Array(botAnalyser.frequencyBinCount);
    botAnalyser.getByteFrequencyData(buf);
    const step = Math.floor(buf.length / BAR_COUNT);
    for (let i = 0; i < BAR_COUNT; i++) raw[i] = buf[i * step];
  } else if (vizMode === 'idle') {
    // Faint idle shimmer
    const t = Date.now() / 1200;
    for (let i = 0; i < BAR_COUNT; i++) {
      raw[i] = 4 + Math.sin(t + i * 0.4) * 2 + Math.sin(t * 1.7 + i * 0.8);
    }
  } else {
    // Muted or no data — flat
    for (let i = 0; i < BAR_COUNT; i++) raw[i] = 2;
  }

  // ── Smooth bars (exponential moving average) ──
  const alpha = vizMode === 'idle' ? 0.12 : 0.35;
  for (let i = 0; i < BAR_COUNT; i++) {
    smoothBars[i] = smoothBars[i] * (1 - alpha) + raw[i] * alpha;
  }

  // ── Draw bars ──
  const gap   = 2;
  const barW  = (W - (BAR_COUNT - 1) * gap) / BAR_COUNT;

  for (let i = 0; i < BAR_COUNT; i++) {
    const norm = Math.min(1, smoothBars[i] / 200);
    const barH = Math.max(2, norm * H * 0.92);
    const x    = i * (barW + gap);
    const y    = H - barH;

    // Color + glow by mode
    let r, g, b;
    if (vizMode === 'listening') {
      // Purple → violet
      r = Math.round(124 + norm * 43);
      g = Math.round(58  + norm * 30);
      b = Math.round(237);
    } else if (vizMode === 'speaking') {
      // Teal → green
      r = Math.round(16  + norm * 36);
      g = Math.round(185 + norm * 26);
      b = Math.round(129 + norm * 24);
    } else {
      // Idle — dim blue-grey
      r = 55; g = 55; b = 100;
    }

    const alpha2 = vizMode === 'idle' ? 0.22 : 0.55 + norm * 0.45;
    ctx2d.fillStyle = `rgba(${r},${g},${b},${alpha2})`;

    // Rounded top corners
    const radius = Math.min(barW / 2, 3);
    ctx2d.beginPath();
    if (ctx2d.roundRect) {
      ctx2d.roundRect(x, y, barW, barH, [radius, radius, 0, 0]);
    } else {
      ctx2d.rect(x, y, barW, barH);
    }
    ctx2d.fill();

    // Glow highlight on tall bars
    if (norm > 0.5 && vizMode !== 'idle') {
      ctx2d.fillStyle = `rgba(${r},${g},${b},${(norm - 0.5) * 0.4})`;
      ctx2d.fillRect(x, y - 2, barW, 3);
    }
  }
}

// Draw idle animation immediately on page load
initCanvas();
vizMode = 'idle';
startViz();

// ── Scenario selection ────────────────────────────────────────────────────────
function selectScenario(btn) {
  if (ws) return;
  scenario = btn.dataset.s;
  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Voice gender selection ────────────────────────────────────────────────────
function selectVoice(gender, btn) {
  if (ws) return;
  voiceGender = gender;
  botName = gender === 'male' ? 'Aryan' : 'Priya';
  document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('botTitle').textContent = `${botName} — AI Voicebot`;
}

// ── Status helpers ────────────────────────────────────────────────────────────
function setStatus(msg, cls = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls;
}

function setOrb(state) {
  const orb = document.getElementById('orb');
  orb.className = `orb ${state}`;
  orb.textContent = state === 'speaking' ? '🔊' : '🎙️';
  // Sync visualizer mode
  if      (state === 'listening') { vizMode = 'listening'; document.getElementById('vizLabel').textContent = 'you'; }
  else if (state === 'speaking')  { vizMode = 'speaking';  document.getElementById('vizLabel').textContent = 'priya'; }
  else                            { vizMode = 'idle';       document.getElementById('vizLabel').textContent = 'frequency'; }
}

// ── Connect ───────────────────────────────────────────────────────────────────
async function connect() {
  document.getElementById('connectBtn').disabled = true;
  setStatus('Requesting microphone...');

  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      video: false
    });
  } catch (e) {
    setStatus('Microphone access denied.', 'err');
    document.getElementById('connectBtn').disabled = false;
    return;
  }

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // ── Mic analyser (does NOT connect to destination — avoids feedback) ──
  micAnalyser = audioCtx.createAnalyser();
  micAnalyser.fftSize = 512;
  micAnalyser.smoothingTimeConstant = 0.75;
  const micSrc = audioCtx.createMediaStreamSource(micStream);
  micSrc.connect(micAnalyser);

  // ── Bot analyser (sits between BufferSource and speakers) ──
  botAnalyser = audioCtx.createAnalyser();
  botAnalyser.fftSize = 512;
  botAnalyser.smoothingTimeConstant = 0.80;
  botAnalyser.connect(audioCtx.destination);

  ws = new WebSocket(`${SERVER}/ws/${scenario}?voice=${voiceGender}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setStatus('Connected — speak now!', 'on');
    setOrb('listening');
    document.getElementById('connectBtn').style.display    = 'none';
    document.getElementById('muteBtn').style.display       = 'block';
    document.getElementById('disconnectBtn').style.display = 'block';
    document.querySelectorAll('.scenario-btn').forEach(b => b.disabled = true);
    document.querySelectorAll('.voice-btn').forEach(b => b.disabled = true);
    startMic();
  };

  ws.onmessage = async (event) => {
    if (event.data instanceof ArrayBuffer) {
      enqueueAudio(event.data);
    } else {
      const msg = JSON.parse(event.data);
      handleMessage(msg);
    }
  };

  ws.onerror = () => setStatus('Connection error.', 'err');
  ws.onclose = () => onDisconnected();
}

// ── Mic ───────────────────────────────────────────────────────────────────────
function startMic() {
  const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus'
    : 'audio/webm';
  mediaRec = new MediaRecorder(micStream, { mimeType });
  mediaRec.ondataavailable = (e) => {
    if (e.data.size > 0 && ws?.readyState === WebSocket.OPEN && !muted)
      ws.send(e.data);
  };
  mediaRec.start(100);
}

function toggleMute() {
  muted = !muted;
  const btn = document.getElementById('muteBtn');
  btn.textContent  = muted ? 'Unmute' : 'Mute';
  btn.style.color  = muted ? '#f87171' : '#aaa';
  btn.style.borderColor = muted ? '#f87171' : '#555';
  setStatus(muted ? 'Microphone muted' : 'Listening…', muted ? 'err' : 'on');
  if (muted && !botSpeaking) vizMode = 'idle';
  else if (!muted && !botSpeaking) vizMode = 'listening';
}

// ── Disconnect ────────────────────────────────────────────────────────────────
function disconnect() {
  ws?.close();
  cleanup();
}

function onDisconnected() {
  cleanup();
  setStatus('Disconnected');
  setOrb('idle');
  document.getElementById('connectBtn').style.display    = 'block';
  document.getElementById('connectBtn').disabled         = false;
  document.getElementById('muteBtn').style.display       = 'none';
  document.getElementById('disconnectBtn').style.display = 'none';
  document.querySelectorAll('.scenario-btn').forEach(b => b.disabled = false);
  document.querySelectorAll('.voice-btn').forEach(b => b.disabled = false);
}

function cleanup() {
  mediaRec?.stop();
  micStream?.getTracks().forEach(t => t.stop());
  mediaRec   = null;
  micStream  = null;
  micAnalyser = null;
  botAnalyser = null;
  audioQueue = [];
  botSpeaking = false;
  vizMode = 'idle';
}

// ── Message handler ───────────────────────────────────────────────────────────
function handleMessage(msg) {
  if (msg.type === 'bot_info') {
    botName = msg.name;
    document.getElementById('botTitle').textContent = `${botName} — AI Voicebot`;
  } else if (msg.type === 'user_text') {
    addBubble('user', msg.text, msg.lang);
    if (!botSpeaking) { setOrb('listening'); setStatus('Listening…', 'on'); }
  } else if (msg.type === 'bot_text') {
    addBubble('bot', msg.text, msg.lang);
    setOrb('speaking');
    setStatus(`${botName} is speaking…`, 'on');
  } else if (msg.type === 'error') {
    setStatus(msg.text, 'err');
  }
}

// ── Audio queue ───────────────────────────────────────────────────────────────
function enqueueAudio(buffer) {
  audioQueue.push(buffer);
  if (!botSpeaking) playNext();
}

async function playNext() {
  if (!audioQueue.length) {
    isPlayingAudio = false;
    botSpeaking    = false;
    setOrb('listening');
    setStatus('Listening…', 'on');
    return;
  }
  isPlayingAudio = true;
  botSpeaking    = true;
  const buf = audioQueue.shift();
  try {
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const audioBuf = await audioCtx.decodeAudioData(buf.slice(0));
    const src = audioCtx.createBufferSource();
    src.buffer = audioBuf;
    // Route through botAnalyser so visualizer can read frequency data
    if (botAnalyser) {
      src.connect(botAnalyser);
    } else {
      src.connect(audioCtx.destination);
    }
    src.onended = () => playNext();
    src.start(0);
  } catch (e) {
    console.error('Audio decode error:', e);
    playNext();
  }
}

// ── Transcript bubbles ─────────────────────────────────────────────────────────
function addBubble(role, text, lang) {
  const box = document.getElementById('transcript');
  box.style.display = 'block';

  const wrap = document.createElement('div');
  wrap.className = `bubble ${role}`;

  const inner = document.createElement('div');
  inner.className = 'bubble-inner';
  inner.textContent = text;

  const badge = document.createElement('span');
  badge.className = `lang-badge lang-${lang || 'en'}`;
  badge.textContent = (lang === 'hi') ? 'HI' : 'EN';
  inner.appendChild(badge);

  const meta = document.createElement('div');
  meta.className = 'bubble-meta';
  meta.textContent = role === 'user' ? 'You' : botName;

  wrap.appendChild(inner);
  wrap.appendChild(meta);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
